# Run against all the files: pre-commit run -a
# Install the git hook scripts: pre-commit install

repos:
  - repo: local
    hooks:
      - id: copyright
        name: fix copyright
        description: Check that files have a copyright notice.
        entry: tools/check_copyright.py
        args: [--fix]
        types_or: [c++, python, cmake]
        language: python
        language_version: python3

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
      - id: check-xml
      - id: end-of-file-fixer
        exclude: ^.*/datasets/
      - id: trailing-whitespace
        exclude: ^.*/datasets/

  - repo: https://github.com/PyCQA/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        additional_dependencies: [flake8-docstrings]

  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-lint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        name: Lint shell scripts
        args: [--severity=warning]

  - repo: local
    hooks:
      - id: docker-compose-check
        name: Validate docker-compose files
        description: Validates docker-compose.yml syntax
        entry: bash -c 'docker compose -f docker/docker-compose.yml config --quiet'
        language: system
        files: docker/docker-compose\.yml
        pass_filenames: false
