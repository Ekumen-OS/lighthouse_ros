# OAK-LR Camera Configuration - Basic Mono Mode
# Copyright 2025 Ekumen
# Simplified configuration for motion capture applications

camera:
  ros__parameters:
    camera:
      i_pipeline_type: Stereo
      i_enable_ir: true
      i_publish_tf_from_calibration: false
      i_restart_on_diagnostics_error: false
      i_tf_base_frame: oak
      i_nn_type: none
      i_tf_camera_model: ''
      i_tf_camera_name: camera
      i_tf_parent_frame: oak-d-base-frame
      i_usb_port_id: ''
      i_usb_speed: SUPER_PLUS
      rgb:
        image_raw:
          enable_pub_plugins:
          # - image_transport/compressedDepth
          # - image_transport/compressed
          - image_transport/raw
          # - image_transport/theora
          format: jpeg
          jpeg_quality: 95
          png_level: 3
          tiff:
            res_unit: inch
            xdpi: -1
            ydpi: -1
    left:
      i_add_exposure_offset: false
      i_board_socket_id: 1
      i_calibration_file: ''
      i_color_order: BGR
      i_disable_node: false
      i_enable_feature_tracker: false
      i_enable_lazy_publisher: true
      i_enable_nn: false
      i_enable_preview: false
      i_exposure_offset: 0
      i_fps: 30.0
      i_fsync_continuous: false
      i_fsync_trigger: false
      i_get_base_device_timestamp: false
      i_height: 480
      i_interleaved: false
      i_isp_den: 5
      i_isp_num: 2
      i_keep_preview_aspect_ratio: true
      i_low_bandwidth: false
      i_low_bandwidth_bitrate: 0
      i_low_bandwidth_ffmpeg_encoder: libx264
      i_low_bandwidth_frame_freq: 30
      i_low_bandwidth_profile: 4
      i_low_bandwidth_quality: 50
      i_max_q_size: 30
      i_output_isp: true
      i_preview_height: 300
      i_preview_size: 300
      i_preview_width: 300
      i_publish_compressed: false
      i_publish_topic: true
      i_resolution: 1200P
      i_reverse_stereo_socket_order: false
      i_sensor_img_orientation: AUTO
      i_set_isp3a_fps: false
      i_set_isp_scale: true
      i_simulate_from_topic: false
      i_simulated_topic_name: ''
      i_synced: false
      i_update_ros_base_time_on_ros_msg: false
      i_width: 768
      r_auto_exp_region_height: 0
      r_auto_exp_region_start_x: 0
      r_auto_exp_region_start_y: 0
      r_auto_exp_region_width: 0
      r_auto_exposure_limit: 1000
      r_chroma_denoise: 1
      r_exposure: 20000
      r_focus: 1
      r_iso: 800
      r_luma_denoise: 1
      r_set_auto_exp_region: false
      r_set_auto_exposure_limit: false
      r_set_chroma_denoise: false
      r_set_luma_denoise: false
      r_set_man_exposure: false
      r_set_man_focus: false
      r_set_man_whitebalance: false
      r_set_sharpness: false
      r_sharpness: 1
      r_whitebalance: 3300
    nn:
      i_board_socket_id: 0
      i_desqueeze_output: false
      i_disable_resize: false
      i_enable_passthrough: false
      i_enable_passthrough_depth: false
      i_get_base_device_timestamp: false
      i_label_map:
      - background
      - aeroplane
      - bicycle
      - bird
      - boat
      - bottle
      - bus
      - car
      - cat
      - chair
      - cow
      - diningtable
      - dog
      - horse
      - motorbike
      - person
      - pottedplant
      - sheep
      - sofa
      - train
      - tvmonitor
      i_max_q_size: 30
      i_model_path: /opt/ros/humble/share/depthai_examples/resources/mobilenet-ssd_openvino_2021.2_6shave.blob
      i_nn_config_path: /opt/ros/humble/share/depthai_ros_driver/config/nn/mobilenet.json
      i_num_inference_threads: 2
      i_num_pool_frames: 4
      i_update_ros_base_time_on_ros_msg: false
